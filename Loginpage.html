<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savannah Stay — Plan Your Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5A3;
      --gold-dim: rgba(201,169,110,.15);
      --cream: #F7F2EB;
      --dark: #0C0E09;
      --mid: #161A10;
      --surface: #1E2416;
      --border: rgba(201,169,110,.2);
      --text: #F0EBE1;
      --muted: rgba(240,235,225,.45);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BG ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201,169,110,.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(100,140,60,.05) 0%, transparent 60%),
        linear-gradient(160deg, #121608 0%, #0C0E09 60%, #0a0c07 100%);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .04;
      background-image: linear-gradient(var(--gold) 1px, transparent 1px),
                        linear-gradient(90deg, var(--gold) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      padding: 24px 60px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(12,14,9,.95), transparent);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--gold); text-decoration: none;
    }
    .nav-tag {
      font-size: .68rem; letter-spacing: .25em; text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MAIN LAYOUT ── */
    .page-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 120px 24px 60px;
    }

    .page-header {
      text-align: center; margin-bottom: 56px;
      opacity: 0; animation: fadeUp .8s .2s forwards;
    }
    .page-eyebrow {
      font-size: .68rem; letter-spacing: .35em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 14px;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 300; line-height: 1.1;
    }
    .page-title em { font-style: italic; color: var(--gold-light); }
    .page-sub {
      margin-top: 14px; font-size: .88rem; color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FORM CARD ── */
    .form-card {
      width: 100%; max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 52px 48px;
      opacity: 0; animation: fadeUp .8s .4s forwards;
    }

    .form-section-label {
      font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .form-section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-row.single { grid-template-columns: 1fr; }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label {
      font-size: .7rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted);
    }
    .field input, .field select {
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(201,169,110,.2);
      border-radius: 2px;
      padding: 14px 16px;
      font-family: 'Jost', sans-serif; font-size: .88rem; font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color .3s, background .3s;
      appearance: none; -webkit-appearance: none;
    }
    .field input::placeholder { color: rgba(240,235,225,.25); }
    .field input:focus, .field select:focus {
      border-color: var(--gold);
      background: rgba(201,169,110,.05);
    }
    .field select option { background: #1E2416; color: var(--text); }

    /* Transport selector */
    .transport-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
      margin-bottom: 20px;
    }
    .transport-option { display: none; }
    .transport-label {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 20px 12px;
      border: 1px solid rgba(201,169,110,.2);
      border-radius: 2px; cursor: pointer;
      transition: all .3s;
      background: rgba(0,0,0,.2);
    }
    .transport-label:hover { border-color: var(--gold); background: var(--gold-dim); }
    .transport-option:checked + .transport-label {
      border-color: var(--gold);
      background: var(--gold-dim);
      box-shadow: 0 0 0 1px var(--gold);
    }
    .transport-icon { font-size: 1.8rem; }
    .transport-name {
      font-size: .72rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--text);
    }

    .form-divider {
      height: 1px; background: var(--border); margin: 32px 0;
    }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 18px;
      background: var(--gold); color: var(--dark);
      border: none; border-radius: 2px;
      font-family: 'Jost', sans-serif;
      font-size: .78rem; font-weight: 500; letter-spacing: .3em; text-transform: uppercase;
      cursor: pointer; transition: background .3s, transform .2s;
      margin-top: 32px;
    }
    .submit-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .form-note {
      text-align: center; margin-top: 16px;
      font-size: .75rem; color: var(--muted);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 20px 24px; }
      .form-card { padding: 36px 24px; }
      .form-row { grid-template-columns: 1fr; }
      .transport-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">Savannah Stay</a>
  <span class="nav-tag">Kenya's Booking Platform</span>
</nav>

<!-- MAIN -->
<div class="page-wrap">

  <div class="page-header">
    <p class="page-eyebrow">Plan Your Journey</p>
    <h1 class="page-title">Where are you<br><em>headed?</em></h1>
    <p class="page-sub">Tell us where you're going and we'll handle the rest.</p>
  </div>

  <div class="form-card">

    <!-- PERSONAL DETAILS -->
    <p class="form-section-label">Your Details</p>
    <div class="form-row">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="e.g. Jabez Mwangi" />
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@email.com" />
      </div>
    </div>
    <div class="form-row single">
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" />
      </div>
    </div>

    <div class="form-divider"></div>

    <!-- JOURNEY DETAILS -->
    <p class="form-section-label">Your Journey</p>
    <div class="form-row">
      <div class="field">
        <label>Starting Place</label>
        <input type="text" id="origin" placeholder="e.g. Nairobi" />
      </div>
      <div class="field">
        <label>Destination</label>
        <input type="text" id="destination" placeholder="e.g. Mombasa" />
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Travel Date</label>
        <input type="date" id="traveldate" />
      </div>
      <div class="field">
        <label>Number of Guests</label>
        <select id="guests">
          <option value="1">1 Guest</option>
          <option value="2">2 Guests</option>
          <option value="3">3 Guests</option>
          <option value="4">4 Guests</option>
          <option value="5+">5+ Guests</option>
        </select>
      </div>
    </div>

    <div class="form-divider"></div>

    <!-- TRANSPORT TYPE -->
    <p class="form-section-label">Preferred Transport</p>
    <div class="transport-grid">
      <div>
        <input type="radio" name="transport" id="t-plane" value="plane" class="transport-option" />
        <label for="t-plane" class="transport-label">
          <span class="transport-icon">✈️</span>
          <span class="transport-name">Plane</span>
        </label>
      </div>
      <div>
        <input type="radio" name="transport" id="t-train" value="train" class="transport-option" checked />
        <label for="t-train" class="transport-label">
          <span class="transport-icon">🚆</span>
          <span class="transport-name">Train</span>
        </label>
      </div>
      <div>
        <input type="radio" name="transport" id="t-vehicle" value="vehicle" class="transport-option" />
        <label for="t-vehicle" class="transport-label">
          <span class="transport-icon">🚌</span>
          <span class="transport-name">Bus / Car</span>
        </label>
      </div>
    </div>

    <!-- SUBMIT -->
    <button class="submit-btn" onclick="goToResults()">Search Available Options →</button>
    <p class="form-note">Your details are saved securely. No hidden fees, ever.</p>

  </div>
</div>

<script>
  function goToResults() {
    const name = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const origin = document.getElementById('origin').value.trim();
    const destination = document.getElementById('destination').value.trim();
    const date = document.getElementById('traveldate').value;
    const guests = document.getElementById('guests').value;
    const transport = document.querySelector('input[name="transport"]:checked')?.value || 'train';

    if (!name || !email || !password || !origin || !destination) {
      alert('Please fill in all required fields before continuing.');
      return;
    }

    // Pass data to next page via URL params
    const params = new URLSearchParams({ name, email, origin, destination, date, guests, transport });
    window.location.href = `results.html?${params.toString()}`;
  }
</script>

</body>
</html>
